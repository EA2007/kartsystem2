# /etc/nginx/sites-available/kartsystem
# Symlink to enable: ln -s /etc/nginx/sites-available/kartsystem /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name dittdomän.se www.dittdomän.se;

    # Redirect all HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dittdomän.se www.dittdomän.se;

    # ── SSL (Let's Encrypt via certbot) ───────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/dittdomän.se/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dittdomän.se/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header Referrer-Policy           "strict-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── Static files (served directly, no Flask overhead) ─────────────
    location /static/ {
        alias /var/www/kartsystem/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Proxy everything else to Gunicorn ─────────────────────────────
    location / {
        proxy_pass         http://unix:/tmp/kartsystem.sock;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
        proxy_connect_timeout 60;
        client_max_body_size 10M;
    }
}
