<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Kartsystem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0d14;--s1:#111520;--s2:#181c28;--s3:#1f2435;--s4:#262c3e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e4e8f5;--text2:#b0b8d0;--muted:#4e5870;
  --accent:#4f7cff;--accent2:rgba(79,124,255,.18);--aglow:rgba(79,124,255,.45);
  --red:#ff4444;--red2:rgba(255,68,68,.14);
  --orange:#ffaa00;--orange2:rgba(255,170,0,.14);
  --green:#22d472;--green2:rgba(34,212,114,.14);
  --r:12px;--panel-w:310px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);overflow:hidden;color:var(--text);-webkit-overflow-scrolling:touch}
#map{position:fixed;inset:0;z-index:0}

/* LOGIN */
#loginScreen{position:fixed;inset:0;z-index:5000;background:linear-gradient(150deg,#060810,#0e1422 60%,#060810);display:flex;align-items:center;justify-content:center;padding:20px}
.lg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(79,124,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(79,124,255,.05) 1px,transparent 1px);background-size:56px 56px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent)}
.lg-box{position:relative;z-index:1;background:rgba(17,21,32,.98);border:1px solid var(--border2);border-radius:20px;padding:40px 32px;width:100%;max-width:400px;box-shadow:0 40px 100px rgba(0,0,0,.7);animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.lg-brand{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.lg-icon{width:44px;height:44px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 6px 20px var(--aglow)}
.lg-brand-text{font-size:20px;font-weight:800}
.lg-title{font-size:22px;font-weight:700;margin-bottom:4px}
.lg-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5}
.lg-field{margin-bottom:14px}
.lg-label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.lg-inp{width:100%;background:var(--s2);border:1.5px solid var(--border2);border-radius:10px;padding:13px 14px;color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.lg-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,124,255,.12)}
.lg-inp::placeholder{color:var(--muted)}
.lg-err{font-size:12px;color:var(--red);min-height:18px;margin-top:6px}
.lg-btn{width:100%;margin-top:8px;padding:14px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-family:'Inter',system-ui,sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px var(--aglow);-webkit-appearance:none}
.lg-btn:hover{background:#3d6bef}
.lg-btn:active{transform:scale(.97)}
.lg-foot{margin-top:18px;text-align:center;font-size:12px;color:var(--muted)}

/* FLOATING TOOL CLUSTER */
#floatTools{position:fixed;top:14px;left:14px;z-index:900;display:flex;flex-direction:column;background:rgba(10,13,20,.93);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:12px;overflow:visible;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.tool-btn{width:42px;height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;color:var(--text2);border:none;background:transparent;-webkit-user-select:none;user-select:none}
.tool-btn:first-child{border-radius:11px 11px 0 0}
.tool-btn:last-child{border-radius:0 0 11px 11px}
.tool-btn+.tool-btn{border-top:1px solid var(--border)}
.tool-btn:hover{background:rgba(255,255,255,.05)}
.tool-btn:active{transform:scale(.92)}
.tool-btn.active-tool{background:rgba(79,124,255,.18);color:var(--accent)}
.hbar{width:15px;height:2px;background:currentColor;border-radius:99px}
.hbar+.hbar{margin-top:3px}
.tool-btn.open .hbar:nth-child(1){transform:translateY(5px) rotate(45deg)}
.tool-btn.open .hbar:nth-child(2){opacity:0;transform:scaleX(0)}
.tool-btn.open .hbar:nth-child(3){transform:translateY(-5px) rotate(-45deg)}
.tool-icon{font-size:16px;line-height:1}

/* SEARCH OVERLAY */
#searchOverlay{position:fixed;top:14px;left:66px;z-index:899;width:260px;transform:translateX(-10px) scale(.97);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
#searchOverlay.vis{transform:translateX(0) scale(1);opacity:1;pointer-events:all}
#placeSearch{width:100%;height:42px;background:rgba(10,13,20,.95);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:10px;padding:0 12px 0 36px;color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;outline:none;transition:border-color .2s;-webkit-appearance:none;box-shadow:0 4px 16px rgba(0,0,0,.5)}
#placeSearch:focus{border-color:var(--accent)}
#placeSearch::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;color:var(--muted)}
#placeResults{position:absolute;top:calc(100% + 6px);left:0;right:0;background:rgba(14,18,28,.98);backdrop-filter:blur(24px);border:1px solid var(--border2);border-radius:10px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.6);display:none;z-index:910;max-height:250px;overflow-y:auto}
#placeResults.vis{display:block}
.place-item{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--border)}
.place-item:last-child{border-bottom:none}
.place-item:hover,.place-item:active{background:var(--s3)}
.place-icon{width:26px;height:26px;border-radius:6px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.place-main{font-size:13px;font-weight:600}
.place-sub{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.place-msg{padding:14px;text-align:center;font-size:12px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:7px}
.spin{width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SIDE PANEL */
#panelBg{position:fixed;inset:0;z-index:1050;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);opacity:0;pointer-events:none;transition:opacity .3s}
#panelBg.vis{opacity:1;pointer-events:all}
#panel{position:fixed;top:0;left:0;bottom:0;width:var(--panel-w);z-index:1100;display:flex;flex-direction:column;background:rgba(10,13,20,.98);backdrop-filter:blur(32px);border-right:1px solid var(--border);box-shadow:8px 0 40px rgba(0,0,0,.6);transform:translateX(-100%);transition:transform .32s cubic-bezier(.32,.72,0,1);padding-top:var(--safe-top)}
#panel.open{transform:translateX(0)}
.panel-hd{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 0;flex-shrink:0}
.panel-brand{display:flex;align-items:center;gap:9px}
.panel-logo{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 4px 12px var(--aglow)}
.panel-brand-name{font-size:16px;font-weight:700}
.close-btn{width:34px;height:34px;background:var(--s2);border:1px solid var(--border);border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--muted);transition:all .15s}
.close-btn:hover{background:var(--s3);color:var(--text)}
.user-strip{display:flex;align-items:center;gap:10px;margin:14px 16px 0;padding:12px 14px;background:var(--s2);border:1px solid var(--border);border-radius:11px;flex-shrink:0}
.user-avatar{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:13px;font-weight:700}
.user-role{font-size:11px;color:var(--muted);margin-top:1px}
.logout-btn{width:32px;height:32px;background:transparent;border:1px solid var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:14px;transition:all .15s;margin-left:auto;flex-shrink:0}
.logout-btn:hover{color:var(--red);border-color:var(--red)}
#panelScroll{flex:1;overflow-y:auto;padding-bottom:calc(20px + var(--safe-bottom));-webkit-overflow-scrolling:touch}
#panelScroll::-webkit-scrollbar{width:0}

/* CUSTOMERS */
.cust-search-wrap{margin:12px 16px 0;position:relative}
.cust-search{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 12px 10px 38px;color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.cust-search:focus{border-color:var(--accent)}
.cust-search::placeholder{color:var(--muted)}
.cs-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;color:var(--muted)}
.sec-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 6px}
.sec-title{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--muted)}
.cust-list{padding:0 16px}
.c-item{display:flex;align-items:center;gap:10px;min-height:54px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:5px;border:1px solid transparent}
.c-item:hover{background:var(--s2)}
.c-item:active{transform:scale(.98)}
.c-item.active{border-color:rgba(255,255,255,.1)}
.c-logo{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;box-shadow:0 3px 10px rgba(0,0,0,.4)}
.c-info{flex:1;min-width:0}
.c-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-sub{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px}
.prog-mini{display:flex;align-items:center;gap:5px}
.prog-mini-bar{width:44px;height:3px;background:rgba(255,255,255,.1);border-radius:99px;overflow:hidden;flex-shrink:0}
.prog-mini-fill{height:100%;border-radius:99px;transition:width .4s}
.prog-mini-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)}
.c-arrow{font-size:11px;color:var(--muted);flex-shrink:0;transition:transform .2s}
.c-item.active .c-arrow{transform:rotate(90deg)}
.empty-msg{padding:24px 16px;text-align:center;font-size:12px;color:var(--muted);line-height:1.7}

/* ADMIN */
.admin-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,68,68,.12);border:1px solid rgba(255,68,68,.2);color:#f87171;font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 9px;border-radius:99px}
.admin-badge::before{content:'';width:5px;height:5px;background:#f87171;border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.a-tabs{display:flex;gap:3px;padding:2px;background:var(--s2);border-radius:10px;margin-top:10px}
.a-tab{flex:1;padding:8px 4px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter',system-ui,sans-serif;font-size:11px;font-weight:600;background:transparent;color:var(--muted);transition:all .15s;text-transform:uppercase;min-height:38px}
.a-tab.on{background:var(--s3);color:var(--text)}
.a-pane{display:none;flex-direction:column;gap:9px;padding-top:2px}
.a-pane.on{display:flex}

/* PROGRESS */
.prog-block{background:var(--s2);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:7px}
.prog-hd{display:flex;align-items:center;gap:9px;padding:10px 12px;cursor:pointer;transition:background .12s;min-height:48px}
.prog-hd:hover{background:var(--s3)}
.prog-cust-logo{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.prog-cust-name{font-size:12px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prog-bar-w{height:4px;background:rgba(255,255,255,.07);border-radius:99px;overflow:hidden;width:52px;flex-shrink:0}
.prog-bar-f{height:100%;border-radius:99px;transition:width .4s}
.prog-pct{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);width:26px;text-align:right;flex-shrink:0}
.prog-areas{display:none;border-top:1px solid var(--border)}
.prog-areas.open{display:block}
.prog-area-row{display:flex;align-items:center;gap:7px;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;min-height:46px}
.prog-area-row:last-child{border-bottom:none}
.prog-area-row:hover{background:var(--s3)}
.prog-area-num{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 5px;flex-shrink:0}
.status-chip{font-size:10px;font-weight:600;padding:3px 7px;border-radius:5px;flex-shrink:0}
.st-new{background:var(--red2);color:#ff7a7a;border:1px solid rgba(255,68,68,.2)}
.st-started{background:var(--orange2);color:#ffc933;border:1px solid rgba(255,170,0,.2)}
.st-done{background:var(--green2);color:#4ddf96;border:1px solid rgba(34,212,114,.2)}
.prog-who{flex:1;min-width:0}
.prog-who-name{font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
.prog-who-time{font-size:10px;color:var(--muted);margin-top:1px}

/* PRESENCE */
.pres-item{display:flex;align-items:center;gap:9px;padding:9px 10px;background:var(--s2);border-radius:9px;cursor:pointer;transition:background .1s;margin-bottom:5px;border:1px solid transparent;min-height:50px}
.pres-item:hover{background:var(--s3);border-color:var(--border)}
.pres-avatar{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.pres-info{flex:1;min-width:0}
.pres-name{font-size:12px;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pres-detail{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
.offline-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.working-chip{display:inline-flex;align-items:center;gap:2px;background:var(--accent2);border:1px solid rgba(79,124,255,.25);color:#93b4ff;font-size:9px;font-weight:600;padding:1px 6px;border-radius:4px;max-width:90px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.online-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(34,212,114,.12);border:1px solid rgba(34,212,114,.2);color:#4ddf96;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}

/* COMMON */
.inp{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:13px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.inp::placeholder{color:var(--muted)}
.inp:focus{border-color:var(--accent)}
.row{display:flex;gap:7px}.row .inp{flex:1}
.btn{padding:10px 14px;border-radius:9px;border:none;cursor:pointer;font-family:'Inter',system-ui,sans-serif;font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap;min-height:42px;-webkit-appearance:none}
.btn:active{transform:scale(.95)}
.btn-p{background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(79,124,255,.3)}
.btn-p:hover{background:#3d6bef}
.btn-g{background:var(--s2);color:var(--text2);border:1px solid var(--border)}
.btn-g:hover{background:var(--s3)}
.btn-d{background:var(--red2);color:#f87171;border:1px solid rgba(255,68,68,.2);width:100%}
.btn-d:hover{background:rgba(255,68,68,.2)}
.btn-ico{width:42px;height:42px;padding:0;display:flex;align-items:center;justify-content:center;font-size:17px}
.sec-label{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.list-row{display:flex;align-items:center;justify-content:space-between;padding:10px 11px;background:var(--s2);border-radius:9px;margin-bottom:5px;min-height:48px;border:1px solid var(--border)}
.lr-name{font-size:12px;color:var(--text);font-weight:700}
.lr-meta{font-size:10px;color:var(--muted);margin-top:1px}
.lr-right{display:flex;align-items:center;gap:5px}
.rmv-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:0 4px;transition:color .15s;min-height:36px;display:flex;align-items:center}
.rmv-btn:hover{color:var(--red)}
.role-chip{font-size:9px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:99px}
.role-admin{background:rgba(255,68,68,.15);color:#f87171;border:1px solid rgba(255,68,68,.2)}
.role-user{background:var(--s2);color:var(--muted);border:1px solid var(--border)}
.merr{font-size:11px;color:var(--red);margin-top:5px;min-height:15px}

/* BANNER */
#activeBanner{position:fixed;bottom:calc(72px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(60px);z-index:900;display:flex;align-items:center;gap:9px;background:rgba(10,13,20,.96);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:99px;padding:9px 16px 9px 10px;box-shadow:0 6px 24px rgba(0,0,0,.5);transition:transform .35s cubic-bezier(.32,.72,0,1);pointer-events:all;cursor:pointer;white-space:nowrap}
#activeBanner.vis{transform:translateX(-50%) translateY(0)}
.banner-logo{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.banner-name{font-size:13px;font-weight:600}
.banner-count{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-left:1px}
.banner-close{width:22px;height:22px;background:rgba(255,255,255,.08);border-radius:99px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--muted);margin-left:3px;transition:all .15s}
.banner-close:hover{background:rgba(255,68,68,.2);color:var(--red)}

/* TOAST */
#toast{position:fixed;bottom:calc(78px + var(--safe-bottom));left:50%;transform:translateX(-50%) translateY(60px);background:var(--s1);border:1px solid var(--border2);border-radius:99px;padding:9px 20px;font-size:12px;color:var(--text);z-index:6000;transition:transform .3s;pointer-events:none;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.5);font-weight:500}
#toast.show{transform:translateX(-50%) translateY(0)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:4000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.vis{display:flex}
.modal{background:var(--s1);border:1px solid var(--border2);border-radius:16px;padding:26px;width:100%;max-width:340px;box-shadow:0 24px 60px rgba(0,0,0,.6);animation:fadeUp .22s ease}
.modal-title{font-size:17px;font-weight:700;margin-bottom:7px}
.modal-sub{font-size:13px;color:var(--text2);margin-bottom:18px;line-height:1.5}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions .btn{flex:1;padding:12px}

/* LEAFLET */
/* LEAFLET CONTROLS ALIGNMENT */

.leaflet-top.leaflet-right{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:14px;
  margin-right:14px;
}

/* remove individual margins so controls align */
.leaflet-control-zoom,
.leaflet-draw-toolbar{
  margin:0!important;
}

/* zoom buttons */
.leaflet-control-zoom a{
  background-color:rgba(10,13,20,.92)!important;

.leaflet-bar{

.area-tip{background:rgba(10,13,20,.95);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:12px;padding:6px 11px;box-shadow:0 4px 16px rgba(0,0,0,.4)}

@media(max-width:480px){

}
</style>
</head>

<!-- LOGIN -->

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script>
// ═══════════════════════════════════
//  PALETTES
// ═══════════════════════════════════
const CUST_COLORS=['#f97316','#a855f7','#ec4899','#14b8a6','#eab308','#6366f1','#84cc16','#f43f5e','#0ea5e9','#d946ef','#fb923c','#34d399'];
const CUST_EMOJIS=['🏢','🏗','🏡','🏭','🌿','⚡','🔧','🌊','🏔','🔑','🎯','🚀'];
const PIN_COLORS=['#f97316','#a855f7','#ec4899','#14b8a6','#eab308','#6366f1','#84cc16','#f43f5e','#0ea5e9','#d946ef'];
const SL={new:'Ny',started:'Pågående',done:'Klar'};
const STYLES={
  new:    {color:'#ff4444',fillColor:'#ff4444',fillOpacity:.38,weight:2.5},
  started:{color:'#ffaa00',fillColor:'#ffaa00',fillOpacity:.38,weight:2.5},
  done:   {color:'#22d472',fillColor:'#22d472',fillOpacity:.38,weight:2.5}
};

// ═══════════════════════════════════
//  STATE
// ═══════════════════════════════════
let currentUser = null;
let customers   = [];     // [{id, name, area_count, done_count, started_count}]
let activeCustomer = null; // customer object
let panelOpen = false, searchOpen = false;
let gpsWatchId = null, gpsMarker = null, gpsCircle = null, gpsActive = false, lastGPSPos = null;
let drawControl = null, pendingDelUser = null, pollTimer = null;
let searchMarker = null, placeTimer = null;
const userMapMarkers = {};

// ═══════════════════════════════════
//  API HELPERS
// ═══════════════════════════════════
async function api(method, url, body) {
  const opts = {
    method,
    headers: {'Content-Type':'application/json','X-Requested-With':'XMLHttpRequest'},
    credentials: 'same-origin',
  };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (r.status === 401) { showLogin(); return null; }
  const data = await r.json();
  if (!r.ok) { toast(data.error || 'Fel'); return null; }
  return data;
}
const GET    = url       => api('GET',    url);
const POST   = (url, b) => api('POST',   url, b);
const PUT    = (url, b) => api('PUT',    url, b);
const PATCH  = (url, b) => api('PATCH',  url, b);
const DELETE = url       => api('DELETE', url);

// ═══════════════════════════════════
//  UTILS
// ═══════════════════════════════════
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escA(s){return String(s||'').replace(/'/g,"\\'")}
let _toastT;
function toast(msg){const e=document.getElementById('toast');e.innerText=msg;e.classList.add('show');clearTimeout(_toastT);_toastT=setTimeout(()=>e.classList.remove('show'),2800)}
function timeSince(iso){
  if(!iso)return'–';
  const s=Math.floor((Date.now()-new Date(iso).getTime())/1000);
  if(s<60)return`${s}s`;if(s<3600)return`${Math.floor(s/60)}min`;
  if(s<86400)return`${Math.floor(s/3600)}h`;return`${Math.floor(s/86400)}d`;
}
function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36)}
function custColor(name){const i=customers.findIndex(c=>c.name===name);return CUST_COLORS[(i<0?0:i)%CUST_COLORS.length]}
function custEmoji(name){const i=customers.findIndex(c=>c.name===name);return CUST_EMOJIS[(i<0?0:i)%CUST_EMOJIS.length]}
function getUserColor(username){const idx=currentUser?.allUsers?.findIndex(u=>u.username===username)??0;return PIN_COLORS[(idx<0?0:idx)%PIN_COLORS.length]}
function isMobile(){return window.innerWidth<=480}

// ═══════════════════════════════════
//  LOGIN / LOGOUT
// ═══════════════════════════════════
function showLogin(){
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('floatTools').style.display='none';
  closePanel();
}
async function doLogin(){
  const u=document.getElementById('liUser').value.trim();
  const p=document.getElementById('liPass').value;
  const err=document.getElementById('liErr');err.innerText='';
  if(!u||!p){err.innerText='Fyll i alla fält.';return}
  const data = await POST('/api/auth/login',{username:u,password:p});
  if(!data)return;
  currentUser=data.user;
  document.getElementById('loginScreen').style.display='none';
  await startApp();
}
async function doLogout(){
  await POST('/api/auth/logout');
  currentUser=null;activeCustomer=null;customers=[];
  drawnItems.clearLayers();stopGPS();stopPoll();clearUserMarkers();
  updateBanner();
  showLogin();
}
async function startApp(){
  document.getElementById('floatTools').style.display='flex';
  document.getElementById('userAvatar').style.background = PIN_COLORS[0];
  document.getElementById('userAvatar').innerText = currentUser.username[0].toUpperCase();
  document.getElementById('userNameLabel').innerText = currentUser.username;
  document.getElementById('userRoleLabel').innerText = currentUser.role==='admin'?'Administratör':'Användare';

  // Load customers
  const data = await GET('/api/customers');
  if(data) customers = data;

  if(currentUser.role==='admin'){
    document.getElementById('adminSection').style.display='block';
    initDraw();
    // Load all users for presence colors
    const users = await GET('/api/users');
    if(users) currentUser.allUsers = users;
    renderAdminCustList();renderAdminUserList();
    startPoll();refreshPresence();
  } else {
    document.getElementById('adminSection').style.display='none';
    removeDraw();
  }
  renderCustomers();
  openPanel();
  // Passive GPS for initial zoom
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(pos=>{
      lastGPSPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
      map.setView([lastGPSPos.lat,lastGPSPos.lng],15,{animate:true});
    },()=>{},{enableHighAccuracy:false,timeout:8000,maximumAge:60000});
  }
}

// ═══════════════════════════════════
//  MAP
// ═══════════════════════════════════
const map=L.map('map',{zoomControl:false}).setView([59.3293,18.0686],13);
L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{maxZoom:21,subdomains:['mt0','mt1','mt2','mt3']}).addTo(map);
L.control.zoom({position:'topright'}).addTo(map);
const drawnItems=new L.FeatureGroup();map.addLayer(drawnItems);

function initDraw(){
  if(drawControl)return;
  drawControl=new L.Control.Draw({position:'topright',draw:{polygon:{shapeOptions:STYLES.new},rectangle:false,polyline:false,circle:false,circlemarker:false,marker:false},edit:{featureGroup:drawnItems}});
  map.addControl(drawControl);
}
function removeDraw(){if(!drawControl)return;map.removeControl(drawControl);drawControl=null}

// ═══════════════════════════════════
//  AREAS
// ═══════════════════════════════════
function styleLayer(l){l.setStyle(STYLES[l._st]||STYLES.new)}
function buildTip(l){
  let s=`<span style="color:${STYLES[l._st]?.color||'#fff'};font-weight:700">${SL[l._st]||''}</span>`;
  if(l._lastUser)s+=`<br><span style="color:var(--muted);font-size:10px">✎ ${esc(l._lastUser)} · ${timeSince(l._lastChanged)}</span>`;
  return s;
}
function attachEvents(l){
  l.on('click',()=>{
    const o=l._st;
    if(l._st==='new')l._st='started';else if(l._st==='started')l._st='new';else if(l._st==='done')l._st='started';
    applyChange(l,o);
  });
  l.on('dblclick',e=>{
    L.DomEvent.stopPropagation(e);
    const o=l._st;l._st=l._st==='done'?'new':'done';
    applyChange(l,o);
  });
  l.bindTooltip(()=>buildTip(l),{sticky:true,className:'area-tip'});
}
async function applyChange(l, oldStatus){
  if(!currentUser||!activeCustomer)return;
  l._lastUser=currentUser.username;
  l._lastChanged=new Date().toISOString();
  styleLayer(l);
  updateBanner();
  // PATCH single area status
  if(l._uid){
    await PATCH(`/api/areas/${l._uid}/status`,{status:l._st});
  }
  // Refresh customer counts
  const data=await GET('/api/customers');
  if(data){customers=data;renderCustomers();renderAdminCustList();}
}
async function saveAllAreas(){
  if(!activeCustomer)return;
  const payload=[];
  drawnItems.eachLayer(l=>{
    payload.push({uid:l._uid||uid(),geojson:l.toGeoJSON(),status:l._st});
  });
  await PUT(`/api/customers/${activeCustomer.id}/areas`,payload);
  const data=await GET('/api/customers');
  if(data){customers=data;renderCustomers();renderAdminCustList();}
}
async function loadCustomerAreas(c){
  drawnItems.clearLayers();
  if(!c)return;
  const areas=await GET(`/api/customers/${c.id}/areas`);
  if(!areas)return;
  areas.forEach(item=>{
    const l=L.geoJSON(item.geojson).getLayers()[0];
    if(!l)return;
    l._st=item.status||'new';
    l._uid=item.uid;
    l._lastUser=item.last_user||null;
    l._lastChanged=item.last_changed||null;
    styleLayer(l);attachEvents(l);drawnItems.addLayer(l);
  });
}
function updateBanner(){
  if(!activeCustomer){document.getElementById('activeBanner').classList.remove('vis');return}
  const layers=[...drawnItems.getLayers()];
  const done=layers.filter(l=>l._st==='done').length;
  const color=custColor(activeCustomer.name);
  document.getElementById('bannerLogo').style.background=color;
  document.getElementById('bannerLogo').innerText=custEmoji(activeCustomer.name);
  document.getElementById('bannerName').innerText=activeCustomer.name;
  document.getElementById('bannerCount').innerText=`${done}/${layers.length}`;
  document.getElementById('activeBanner').classList.add('vis');
}

map.on(L.Draw.Event.CREATED,async e=>{
  if(!activeCustomer){toast('Välj en kund först!');return}
  const l=e.layer;
  l._st='new';l._uid=uid();l._lastUser=currentUser?.username;l._lastChanged=new Date().toISOString();
  styleLayer(l);attachEvents(l);drawnItems.addLayer(l);
  await saveAllAreas();
  updateBanner();
});
map.on('draw:edited',()=>saveAllAreas());
map.on('draw:deleted',async()=>{await saveAllAreas();updateBanner();});

// ═══════════════════════════════════
//  CUSTOMER SELECT
// ═══════════════════════════════════
async function selectCustomer(c){
  if(activeCustomer?.id===c.id){deselectCustomer();return}
  activeCustomer=c;
  await loadCustomerAreas(c);
  updateBanner();
  renderCustomers();
  zoomToCustomer();
  closePanel();
  // Publish working-on to presence
  POST('/api/presence',{lat:lastGPSPos?.lat,lng:lastGPSPos?.lng,accuracy:null,working_on:c.name});
  if(currentUser.role==='admin')document.getElementById('resetBtn').style.display='block';
}
function deselectCustomer(){
  activeCustomer=null;drawnItems.clearLayers();
  updateBanner();renderCustomers();
  if(currentUser.role==='admin')document.getElementById('resetBtn').style.display='none';
  POST('/api/presence',{lat:lastGPSPos?.lat,lng:lastGPSPos?.lng,accuracy:null,working_on:null});
  zoomToMyGPS();
}
function zoomToCustomer(){
  const ls=drawnItems.getLayers();
  if(ls.length>0){
    const pad=isMobile()?[16,16]:[50,50];
    map.fitBounds(drawnItems.getBounds(),{padding:pad,maxZoom:19,animate:true,duration:.8});
  } else zoomToMyGPS();
}
function zoomToMyGPS(){
  if(lastGPSPos)map.flyTo([lastGPSPos.lat,lastGPSPos.lng],17,{duration:.8});
}
function zoomToAreaByUid(uid){
  drawnItems.eachLayer(l=>{if(l._uid===uid)map.fitBounds(l.getBounds(),{padding:[50,50],maxZoom:20,animate:true,duration:.6})});
}

// ═══════════════════════════════════
//  RENDER CUSTOMERS
// ═══════════════════════════════════
function renderCustomers(){
  const q=(document.getElementById('custSearch')?.value||'').toLowerCase();
  const div=document.getElementById('custList');div.innerHTML='';
  const badge=document.getElementById('custCountBadge');
  if(badge)badge.innerText=customers.length||'';
  const filtered=customers.filter(c=>c.name.toLowerCase().includes(q));
  if(!filtered.length){div.innerHTML=`<div class="empty-msg">${customers.length?'Ingen träff':'Inga kunder ännu<br>Lägg till i adminpanelen'}</div>`;return}
  filtered.forEach(c=>{
    const n=c.area_count,done=c.done_count,started=c.started_count;
    const pct=n?Math.round(done/n*100):0;
    const color=custColor(c.name),emoji=custEmoji(c.name);
    const isActive=activeCustomer?.id===c.id;
    const el=document.createElement('div');el.className='c-item'+(isActive?' active':'');
    if(isActive){el.style.background=color+'1a';el.style.borderColor=color+'44'}
    el.innerHTML=`<div class="c-logo" style="background:${color}">${emoji}</div>
      <div class="c-info">
        <div class="c-name">${esc(c.name)}</div>
        <div class="c-sub">
          <div class="prog-mini">
            <div class="prog-mini-bar"><div class="prog-mini-fill" style="width:${pct}%;background:${pct===100?'var(--green)':pct>0?'var(--orange)':'var(--red)'}"></div></div>
            <span class="prog-mini-label">${n?`${done}/${n}`:'0'}</span>
          </div>
          ${started>0?`<span style="font-size:9px;color:var(--orange)">⬤ ${started}</span>`:''}
        </div>
      </div>
      <span class="c-arrow" style="color:${isActive?color:'var(--muted)'}">›</span>`;
    el.onclick=()=>selectCustomer(c);
    div.appendChild(el);
  });
}

// ═══════════════════════════════════
//  PANEL
// ═══════════════════════════════════
function togglePanel(){if(panelOpen)closePanel();else openPanel()}
function openPanel(){panelOpen=true;document.getElementById('panel').classList.add('open');document.getElementById('panelBg').classList.add('vis');document.getElementById('menuBtn').classList.add('open')}
function closePanel(){panelOpen=false;document.getElementById('panel').classList.remove('open');document.getElementById('panelBg').classList.remove('vis');document.getElementById('menuBtn').classList.remove('open')}

// ═══════════════════════════════════
//  SEARCH
// ═══════════════════════════════════
let _placeTimer;
function toggleSearch(){
  searchOpen=!searchOpen;
  document.getElementById('searchOverlay').classList.toggle('vis',searchOpen);
  document.getElementById('searchBtn').classList.toggle('active-tool',searchOpen);
  document.getElementById('searchBtnIcon').innerText=searchOpen?'✕':'🔍';
  if(searchOpen)setTimeout(()=>document.getElementById('placeSearch').focus(),150);
  else{document.getElementById('placeResults').classList.remove('vis');document.getElementById('placeSearch').value=''}
}
function onPlaceInput(){
  clearTimeout(_placeTimer);
  const q=document.getElementById('placeSearch').value.trim();
  if(q.length<3){document.getElementById('placeResults').classList.remove('vis');return}
  document.getElementById('placeResults').innerHTML='<div class="place-msg"><div class="spin"></div> Söker…</div>';
  document.getElementById('placeResults').classList.add('vis');
  _placeTimer=setTimeout(()=>doPlaceSearch(q),400);
}
async function doPlaceSearch(q){
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&countrycodes=se&accept-language=sv`);
    const data=await r.json();renderPlaceResults(data);
  }catch{document.getElementById('placeResults').innerHTML='<div class="place-msg">Kunde inte söka</div>'}
}
function renderPlaceResults(data){
  const r=document.getElementById('placeResults');
  if(!data.length){r.innerHTML='<div class="place-msg">Inga träffar</div>';return}
  r.innerHTML='';
  data.forEach(item=>{
    const parts=item.display_name.split(', ');const main=parts[0];const sub=parts.slice(1,3).join(', ');
    const el=document.createElement('div');el.className='place-item';
    el.innerHTML=`<div class="place-icon">${placeEmoji(item.type||item.class)}</div>
      <div style="flex:1;min-width:0"><div class="place-main">${esc(main)}</div><div class="place-sub">${esc(sub)}</div></div>`;
    el.onclick=()=>{
      map.flyTo([+item.lat,+item.lon],17,{duration:1});
      if(searchMarker)map.removeLayer(searchMarker);
      searchMarker=L.marker([+item.lat,+item.lon],{icon:L.divIcon({className:'',html:`<div style="width:14px;height:14px;background:var(--accent);border:3px solid #fff;border-radius:50%;box-shadow:0 0 12px var(--aglow)"></div>`,iconSize:[14,14],iconAnchor:[7,7]})}).addTo(map).bindPopup(`<div>${esc(main)}</div>`,{className:'area-tip'}).openPopup();
      toggleSearch();
    };
    r.appendChild(el);
  });
}
function placeEmoji(t){const m={road:'🛣',street:'🛤',residential:'🏘',house:'🏠',building:'🏢',shop:'🛍',restaurant:'🍽',school:'🏫',hospital:'🏥',church:'⛪',park:'🌳',river:'🌊',lake:'💧',city:'🏙',town:'🏙',village:'🏡'};for(const[k,v]of Object.entries(m)){if(t?.includes(k))return v}return'📍'}
function onPlaceKey(e){if(e.key==='Escape')toggleSearch()}
function hideResultsDelay(){setTimeout(()=>document.getElementById('placeResults').classList.remove('vis'),200)}

// ═══════════════════════════════════
//  GPS
// ═══════════════════════════════════
function toggleGPS(){if(gpsActive)stopGPS();else startGPS()}
function startGPS(){
  if(!navigator.geolocation){toast('GPS stöds inte');return}
  document.getElementById('gpsBtn').classList.add('active-tool');
  document.getElementById('gpsBtnIcon').innerText='🛰';
  gpsActive=true;
  gpsWatchId=navigator.geolocation.watchPosition(onGPS,onGPSErr,{enableHighAccuracy:true,maximumAge:5000});
}
function onGPS(pos){
  const{latitude:lat,longitude:lng,accuracy:acc}=pos.coords;
  lastGPSPos={lat,lng};
  if(gpsMarker)map.removeLayer(gpsMarker);
  if(gpsCircle)map.removeLayer(gpsCircle);
  gpsCircle=L.circle([lat,lng],{radius:acc,color:'#4f7cff',fillColor:'#4f7cff',fillOpacity:.07,weight:1,dashArray:'4'}).addTo(map);
  gpsMarker=L.marker([lat,lng],{icon:L.divIcon({className:'',html:`<div style="width:14px;height:14px;background:#4f7cff;border:3px solid #fff;border-radius:50%;box-shadow:0 0 12px rgba(79,124,255,.9)"></div>`,iconSize:[14,14],iconAnchor:[7,7]})}).addTo(map);
  if(!activeCustomer)map.setView([lat,lng],map.getZoom()<15?16:map.getZoom());
  POST('/api/presence',{lat,lng,accuracy:acc,working_on:activeCustomer?.name||null});
}
function stopGPS(){
  if(gpsWatchId)navigator.geolocation.clearWatch(gpsWatchId);
  if(gpsMarker)map.removeLayer(gpsMarker);
  if(gpsCircle)map.removeLayer(gpsCircle);
  gpsMarker=null;gpsCircle=null;gpsWatchId=null;gpsActive=false;
  DELETE('/api/presence');
  document.getElementById('gpsBtn').classList.remove('active-tool');
  document.getElementById('gpsBtnIcon').innerText='📍';
}
function onGPSErr(e){toast('GPS: '+(e.code===1?'Nekad':e.code===2?'Ej tillgänglig':'Timeout'));stopGPS()}

// ═══════════════════════════════════
//  ADMIN: CUSTOMERS
// ═══════════════════════════════════
async function addCustomer(){
  const inp=document.getElementById('newCustInp');
  const name=inp.value.trim();if(!name)return;
  const data=await POST('/api/customers',{name});
  if(!data)return;
  customers.push(data);inp.value='';
  renderCustomers();renderAdminCustList();toast(`"${name}" skapad`);
}
function renderAdminCustList(){
  const div=document.getElementById('adminCustList');div.innerHTML='';
  customers.forEach(c=>{
    const pct=c.area_count?Math.round(c.done_count/c.area_count*100):0;
    const color=custColor(c.name);
    const el=document.createElement('div');el.className='list-row';
    el.innerHTML=`<div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
      <div style="width:26px;height:26px;border-radius:7px;background:${color};display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0">${custEmoji(c.name)}</div>
      <div style="flex:1;min-width:0">
        <div class="lr-name">${esc(c.name)}</div>
        <div style="display:flex;align-items:center;gap:5px;margin-top:3px">
          <div style="flex:1;height:3px;background:var(--border2);border-radius:2px"><div style="width:${pct}%;height:100%;background:${pct===100?'var(--green)':pct>0?'var(--orange)':'var(--red)'};border-radius:2px;transition:width .3s"></div></div>
          <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--muted)">${pct}%</span>
        </div>
      </div></div>
      <button class="rmv-btn" onclick="removeCustomer(${c.id},'${escA(c.name)}')">×</button>`;
    div.appendChild(el);
  });
}
async function removeCustomer(id, name){
  if(!confirm(`Ta bort "${name}"?`))return;
  const ok=await DELETE(`/api/customers/${id}`);
  if(!ok)return;
  customers=customers.filter(c=>c.id!==id);
  if(activeCustomer?.id===id)deselectCustomer();
  renderCustomers();renderAdminCustList();toast(`"${name}" borttagen`);
}
function confirmReset(){
  if(!activeCustomer)return;
  document.getElementById('resetSub').innerText=`Alla ytor för "${activeCustomer.name}" raderas permanent.`;
  openModal('resetModal');
}
async function doReset(){
  await DELETE(`/api/customers/${activeCustomer.id}/areas`);
  drawnItems.clearLayers();closeModal('resetModal');updateBanner();
  const data=await GET('/api/customers');if(data){customers=data;renderCustomers();renderAdminCustList();}
  toast('Ytor nollställda');
}

//  ADMIN: USERS

async function registerUser(){
  const u=document.getElementById('regUser').value.trim();
  const p=document.getElementById('regPass').value;
  const r=document.getElementById('regRole').value;
  const err=document.getElementById('regErr');err.innerText='';
  const data=await POST('/api/users',{username:u,password:p,role:r});
  if(!data){return}
  if(!currentUser.allUsers)currentUser.allUsers=[];
  currentUser.allUsers.push(data);
  document.getElementById('regUser').value='';document.getElementById('regPass').value='';
  renderAdminUserList();toast(`"${u}" skapad`);
}
function renderAdminUserList(){
  const div=document.getElementById('adminUserList');div.innerHTML='';
  const all=currentUser?.allUsers||[];
  all.forEach((u,i)=>{
    const color=PIN_COLORS[i%PIN_COLORS.length];
    const isSelf=u.id===currentUser?.id;
    const el=document.createElement('div');el.className='list-row';
    el.innerHTML=`<div style="display:flex;align-items:center;gap:8px">
      <div style="width:26px;height:26px;border-radius:7px;background:${color};display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">${u.username[0].toUpperCase()}</div>
      <div><div class="lr-name">${esc(u.username)}</div><div class="lr-meta">${u.role==='admin'?'Admin':'Användare'}</div></div></div>
      <div class="lr-right">
        <span class="role-chip ${u.role==='admin'?'role-admin':'role-user'}">${u.role==='admin'?'ADMIN':'USER'}</span>
        ${isSelf?'':'<button class="rmv-btn" onclick="askDelUser('+u.id+',\''+escA(u.username)+'\')">×</button>'}
      </div>`;
    div.appendChild(el);
  });
}
function askDelUser(id,username){
  pendingDelUser={id,username};
  document.getElementById('delUserSub').innerText=`Användaren "${username}" tas bort permanent.`;
  openModal('delUserModal');
}
async function confirmDelUser(){
  if(!pendingDelUser)return;
  const ok=await DELETE(`/api/users/${pendingDelUser.id}`);
  if(!ok)return;
  toast(`"${pendingDelUser.username}" borttagen`);
  currentUser.allUsers=currentUser.allUsers.filter(u=>u.id!==pendingDelUser.id);
  pendingDelUser=null;closeModal('delUserModal');renderAdminUserList();
}

// ═══════════════════════════════════
//  TABS
// ═══════════════════════════════════
const TAB_IDS=['Kunder','Anvandare','Narvaro','Progress'];
function switchTab(t){
  TAB_IDS.forEach(id=>{document.getElementById('tab'+id)?.classList.toggle('on',id===t);document.getElementById('pane'+id)?.classList.toggle('on',id===t)});
  if(t==='Narvaro')refreshPresence();if(t==='Progress')renderProgress();
}

// ═══════════════════════════════════
//  PRESENCE (admin)
// ═══════════════════════════════════
function clearUserMarkers(){Object.values(userMapMarkers).forEach(({m,c})=>{if(m)map.removeLayer(m);if(c)map.removeLayer(c)});Object.keys(userMapMarkers).forEach(k=>delete userMapMarkers[k])}
function updateUserMarker(username,entry,color){
  if(userMapMarkers[username]){if(userMapMarkers[username].m)map.removeLayer(userMapMarkers[username].m);if(userMapMarkers[username].c)map.removeLayer(userMapMarkers[username].c)}
  if(!entry?.online||!entry.lat){delete userMapMarkers[username];return}
  const{lat,lng,accuracy}=entry;
  const c=L.circle([lat,lng],{radius:accuracy||20,color,fillColor:color,fillOpacity:.07,weight:1,dashArray:'4'}).addTo(map);
  const m=L.marker([lat,lng],{icon:L.divIcon({className:'',html:`<div class="user-pin-wrap"><div class="user-pin-label">${esc(username)}</div><div class="user-pin-dot" style="background:${color};box-shadow:0 0 10px ${color}88"></div></div>`,iconSize:[80,40],iconAnchor:[40,38]})}).addTo(map);
  m.bindTooltip(`<strong>${esc(username)}</strong><br><span style="font-family:'DM Mono',monospace;font-size:10px">${lat.toFixed(5)}, ${lng.toFixed(5)}${entry.working_on?`<br>📋 ${esc(entry.working_on)}`:''}</span>`,{className:'area-tip',direction:'top'});
  userMapMarkers[username]={m,c};
}
async function refreshPresence(){
  if(currentUser?.role!=='admin')return;
  const data=await GET('/api/presence');
  if(!data)return;
  // Update map markers
  const all=currentUser?.allUsers||[];
  data.forEach((p,i)=>{
    if(p.username!==currentUser.username)updateUserMarker(p.username,p,PIN_COLORS[i%PIN_COLORS.length]);
  });
  const div=document.getElementById('presList');div.innerHTML='';
  const sorted=[...data].sort((a,b)=>(b.online?1:0)-(a.online?1:0));
  const oc=sorted.filter(x=>x.online).length;
  document.getElementById('onlineBadge').innerHTML=oc>0?`<span class="online-badge"><span class="online-dot" style="animation:pulse 2s infinite"></span>${oc} online</span>`:'';
  if(!sorted.length){div.innerHTML='<div class="empty-msg">Inga användare</div>';return}
  sorted.forEach((p,i)=>{
    const color=PIN_COLORS[i%PIN_COLORS.length];
    const el=document.createElement('div');el.className='pres-item';
    const coords=p.lat?`${p.lat.toFixed(4)}, ${p.lng.toFixed(4)} · ±${Math.round(p.accuracy||0)}m`:'Ingen GPS';
    const wChip=p.working_on?`<span class="working-chip">📋 ${esc(p.working_on)}</span>`:'';
    el.innerHTML=`<div class="pres-avatar" style="background:${color}">${(p.username||'?')[0].toUpperCase()}</div>
      <div class="pres-info">
        <div class="pres-name">${esc(p.username)} ${wChip}</div>
        <div class="pres-detail">${coords}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        ${p.online?'<span class="online-dot"></span>':'<span class="offline-dot"></span>'}
        <span style="font-size:9px;color:var(--muted)">${timeSince(p.updated_at)}</span>
      </div>`;
    if(p.online&&p.lat)el.onclick=()=>{map.flyTo([p.lat,p.lng],17,{duration:.8});closePanel()};
    div.appendChild(el);
  });
}

// ═══════════════════════════════════
//  PROGRESS (admin)
// ═══════════════════════════════════
async function renderProgress(){
  const div=document.getElementById('progList');div.innerHTML='';
  const q=(document.getElementById('progFilter')?.value||'').toLowerCase();
  const filtered=customers.filter(c=>!q||c.name.toLowerCase().includes(q));
  if(!filtered.length){div.innerHTML='<div class="empty-msg">Inga kunder</div>';return}
  for(const c of filtered){
    const pct=c.area_count?Math.round(c.done_count/c.area_count*100):0;
    const color=custColor(c.name);
    const block=document.createElement('div');block.className='prog-block';
    const hd=document.createElement('div');hd.className='prog-hd';
    hd.innerHTML=`<div class="prog-cust-logo" style="background:${color}">${custEmoji(c.name)}</div>
      <span class="prog-cust-name">${esc(c.name)}</span>
      <div class="prog-bar-w"><div class="prog-bar-f" style="width:${pct}%;background:${pct===100?'var(--green)':pct>0?'var(--orange)':'var(--red)'}"></div></div>
      <span class="prog-pct">${pct}%</span>
      <span style="font-size:11px;color:var(--muted);margin-left:3px">▾</span>`;
    const areaDiv=document.createElement('div');areaDiv.className='prog-areas';
    hd.onclick=async()=>{
      areaDiv.classList.toggle('open');
      hd.querySelectorAll('span:last-child')[0].innerText=areaDiv.classList.contains('open')?'▴':'▾';
      if(areaDiv.classList.contains('open')&&!areaDiv.children.length){
        const areas=await GET(`/api/customers/${c.id}/areas`);
        if(areas)buildAreaRows(areaDiv,c,areas,q);
      }
    };
    block.appendChild(hd);block.appendChild(areaDiv);div.appendChild(block);
  }
}
function buildAreaRows(container,customer,areas,q){
  if(!areas.length){container.innerHTML='<div style="padding:12px;text-align:center;font-size:11px;color:var(--muted)">Inga ytor</div>';return}
  const order={started:0,new:1,done:2};
  [...areas].sort((a,b)=>(order[a.status]||1)-(order[b.status]||1)).forEach((item,i)=>{
    const hl=q&&item.last_user?.toLowerCase().includes(q);
    const uc=item.last_user?getUserColor(item.last_user):'#5a6180';
    const sc={new:'st-new',started:'st-started',done:'st-done'};
    const row=document.createElement('div');row.className='prog-area-row';
    if(hl)row.style.background='rgba(79,124,255,.07)';
    row.innerHTML=`<span class="prog-area-num">#${i+1}</span>
      <span class="status-chip ${sc[item.status]||'st-new'}">${SL[item.status]||'Ny'}</span>
      <div class="prog-who">
        ${item.last_user?`<div class="prog-who-name"><div style="width:16px;height:16px;border-radius:4px;background:${uc};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:#fff;flex-shrink:0">${item.last_user[0].toUpperCase()}</div>${esc(item.last_user)}</div>
        <div class="prog-who-time">${timeSince(item.last_changed)}</div>`:'<div class="prog-who-name" style="color:var(--muted)">Ingen ännu</div>'}
      </div>`;
    row.onclick=()=>{
      if(activeCustomer?.id!==customer.id){
        selectCustomer(customer).then(()=>setTimeout(()=>zoomToAreaByUid(item.uid),500));
      } else {zoomToAreaByUid(item.uid);closePanel()}
    };
    container.appendChild(row);
  });
}
