<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Kartsystem</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css"/>

<style>
*,*::before,*::after{
  box-sizing:border-box;
  margin:0;
  padding:0;
  -webkit-tap-highlight-color:transparent;
}

:root{
  --bg:#0a0d14;
  --text:#e4e8f5;
}

html,body{
  height:100%;
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg);
  overflow:hidden;
  color:var(--text);
}

#map{
  position:fixed;
  inset:0;
  z-index:1;
}

/* ===== TOAST ===== */
#toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.85);
  color:#fff;
  padding:12px 18px;
  border-radius:10px;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s ease;
  z-index:9999;
}

#toast.show{
  opacity:1;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>
// ================= STATE =================
let currentUser=null;
let customers=[];
let activeCustomer=null;

let lastGPSPos=null;
let gpsWatchId=null;
let gpsMarker=null;
let gpsCircle=null;
let gpsActive=false;

let searchOpen=false;
let searchMarker=null;

let drawControl=null;
let pollTimer=null;

let placeTimer=null;

// ================= TOAST FIX =================
let toastTimer = null;

function toast(msg){
  const e = document.getElementById('toast');

  e.innerText = msg;
  e.classList.add('show');

  // Rensa gammal timer (viktigt!)
  if (toastTimer) clearTimeout(toastTimer);

  // Försvinner efter 2 sek
  toastTimer = setTimeout(() => {
    e.classList.remove('show');
  }, 2000);
}

// ================= HELPERS =================
async function api(m,u,b){
  const r=await fetch(u,{
    method:m,
    headers:{'Content-Type':'application/json'},
    credentials:'same-origin',
    body:b?JSON.stringify(b):undefined
  });
  if(!r.ok)return null;
  return r.json();
}
const GET=u=>api('GET',u);
const POST=(u,b)=>api('POST',u,b);
const PATCH=(u,b)=>api('PATCH',u,b);
const DELETE=u=>api('DELETE',u);

// ================= FIXED CUSTOMER SELECT =================
async function selectCustomer(c){
  if(activeCustomer?.id===c.id){deselectCustomer();return}

  activeCustomer=c;

  await loadCustomerAreas(c);
  updateBanner?.();
  renderCustomers?.();
  closePanel?.();

  if(lastGPSPos){
    POST('/api/presence',{
      lat:lastGPSPos.lat,
      lng:lastGPSPos.lng,
      accuracy:null,
      working_on:c.name,
      updated_at:new Date().toISOString()
    });
  } else {
    POST('/api/presence',{
      lat:null,
      lng:null,
      accuracy:null,
      working_on:c.name,
      updated_at:new Date().toISOString()
    });
  }
}

// ================= SEARCH FIX =================
function onPlaceInput(){
  clearTimeout(placeTimer);
  const q=document.getElementById('placeSearch')?.value.trim();
  if(!q || q.length<3)return;

  placeTimer=setTimeout(()=>doPlaceSearch(q),400);
}

// ================= GPS SAFE =================
function onGPS(pos){
  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;
  const acc=pos.coords.accuracy;

  lastGPSPos={lat,lng};

  POST('/api/presence',{
    lat,lng,accuracy:acc,
    working_on:activeCustomer?.name||null
  });
}

// ================= STUBS =================
function loadCustomerAreas(){}
function updateBanner(){}
function renderCustomers(){}
function closePanel(){}
function deselectCustomer(){activeCustomer=null}

// ================= INIT MAP =================
const map=L.map('map',{
  tap:true,
  touchZoom:true,
  dragging:true
}).setView([59.33,18.06],13);

L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{
  subdomains:['mt0','mt1','mt2','mt3']
}).addTo(map);

// ================= TEST =================
map.on('click',()=>{
  toast("Du klickade på kartan");
});
</script>

</body>
</html>
