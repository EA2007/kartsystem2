<!DOCTYPE html>
<html lang="sv">
<head>

<title>Kartsystem</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
/* ===== DIN CSS (oförändrad) ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a0d14;--s1:#111520;--s2:#181c28;--s3:#1f2435;--s4:#262c3e;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#e4e8f5;--text2:#b0b8d0;--muted:#4e5870;--accent:#4f7cff;--accent2:rgba(79,124,255,.18);--aglow:rgba(79,124,255,.45);--red:#ff4444;--red2:rgba(255,68,68,.14);--orange:#ffaa00;--orange2:rgba(255,170,0,.14);--green:#22d472;--green2:rgba(34,212,114,.14);--r:12px;--panel-w:310px;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--bg);overflow:hidden;color:var(--text)}
#map{position:fixed;inset:0;z-index:0}
/* (resten av din CSS är oförändrad — bortklippt här för längd) */
</style>
</head>

<body>
<div id="map"></div>
<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>

<script>
// ================= STATE =================
let currentUser=null;
let customers=[];
let activeCustomer=null;

let lastGPSPos=null;
let gpsWatchId=null;
let gpsMarker=null;
let gpsCircle=null;
let gpsActive=false;

let searchOpen=false;
let searchMarker=null;

let drawControl=null;
let pollTimer=null;

// FIX: en enda timer (tidigare bug)
let placeTimer=null;

// ================= HELPERS =================
function toast(msg){
  const e=document.getElementById('toast');
  e.innerText=msg;
  e.classList.add('show');
  setTimeout(()=>e.classList.remove('show'),2000);
}

async function api(m,u,b){
  const r=await fetch(u,{
    method:m,
    headers:{'Content-Type':'application/json'},
    credentials:'same-origin',
    body:b?JSON.stringify(b):undefined
  });
  if(!r.ok)return null;
  return r.json();
}
const GET=u=>api('GET',u);
const POST=(u,b)=>api('POST',u,b);
const PATCH=(u,b)=>api('PATCH',u,b);
const DELETE=u=>api('DELETE',u);

// ================= FIXED CUSTOMER SELECT =================
async function selectCustomer(c){
  if(activeCustomer?.id===c.id){deselectCustomer();return}

  activeCustomer=c;

  await loadCustomerAreas(c);
  updateBanner?.();
  renderCustomers?.();
  closePanel?.();

  // FIX: inga undefined lat/lng/acc
  if(lastGPSPos){
    POST('/api/presence',{
      lat:lastGPSPos.lat,
      lng:lastGPSPos.lng,
      accuracy:null,
      working_on:c.name,
      updated_at:new Date().toISOString()
    });
  } else {
    POST('/api/presence',{
      lat:null,
      lng:null,
      accuracy:null,
      working_on:c.name,
      updated_at:new Date().toISOString()
    });
  }
}

// ================= SEARCH FIX =================
function onPlaceInput(){
  clearTimeout(placeTimer);
  const q=document.getElementById('placeSearch').value.trim();
  if(q.length<3)return;

  placeTimer=setTimeout(()=>doPlaceSearch(q),400);
}

// ================= GPS SAFE =================
function onGPS(pos){
  const lat=pos.coords.latitude;
  const lng=pos.coords.longitude;
  const acc=pos.coords.accuracy;

  lastGPSPos={lat,lng};

  POST('/api/presence',{
    lat,lng,accuracy:acc,
    working_on:activeCustomer?.name||null
  });
}

// ================= STUBS (om dina saknas) =================
function loadCustomerAreas(){}
function updateBanner(){}
function renderCustomers(){}
function closePanel(){}
function deselectCustomer(){activeCustomer=null}

// ================= INIT MAP =================
const map=L.map('map').setView([59.33,18.06],13);
L.tileLayer('https://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}',{
  subdomains:['mt0','mt1','mt2','mt3']
}).addTo(map);

</script>
</body>
</html>
